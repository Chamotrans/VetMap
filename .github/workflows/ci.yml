name: Backend and Config Validation

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

jobs:
  validate:
    name: "Firebase rules and functions"
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: |
            functions/package-lock.json
            firebase-tests/package-lock.json

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "21"

      - name: Install dependencies
        run: |
          npm ci --prefix functions
          npm ci --prefix firebase-tests

      - name: Validate Functions
        run: |
          npm run lint --prefix functions
          node -e "require('./functions/index.js')"

      - name: Test Firestore and Storage rules
        run: >
          npx --yes firebase-tools@15.19.0 emulators:exec
          --project demo-vetmap-rules
          --only firestore,storage
          "npm test --prefix firebase-tests"

      - name: Check patch hygiene
        run: git diff --check

# The signed iOS Test/Archive release proof is produced by Xcode Cloud.
